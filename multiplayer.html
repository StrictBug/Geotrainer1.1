<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geotrainer Multiplayer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Geotrainer Multiplayer</h1>
        <p id="location">Guess the location!</p>
        <p id="timer">Time left: 15s</p>
        <div id="map"></div>
        <p id="score">Your Score: 0</p>
        <p id="round">Round: 1/15</p>
        <div id="players"><span id="playerList"></span></div>
        <div id="result"></div>
        <button id="newRound" disabled>New Round</button>
        <button id="guess" disabled>Guess</button>
        <div id="gameOver" class="game-over hidden">
            <div id="roundSummary"></div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="multiplayer.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD1NquuKOH2KwEk_-mYL4n7JE8n0q5AOfI&libraries=geometry&callback=initMap" async defer></script>
</body>
</html>
